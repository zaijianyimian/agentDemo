spring:
  application:
    name: demo
  datasource:
    url: jdbc:mysql://localhost:3306/agent?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your_db_password
    druid:
      max-active: 10
      initial-size: 1
      min-idle: 1
      max-wait: 60000
      test-on-borrow: true
langchain4j:
  open-ai:
    chat-model:
      api-key: your_llm_api_key
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-plus
  ollama:
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text:latest
server:
  port: 8000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true
      force-request: true
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
app:
  # 内存存储配置
  memory:
    collection-name: agent_memory
    top-k: 5
    min-score: 0.5
  qdrant:
    host: localhost
    port: 6334
  mcp:
    auto-sync:
      enabled: false
      url: ""
      token: ""
      cron: "0 */5 * * * ?"
      connect-timeout-seconds: 5
      read-timeout-seconds: 15
      sync-enabled-state: true
      disable-missing: true
      missing-threshold: 2
  # 网络搜索配置
  search:
    enabled: true
    # 搜索引擎类型: serper, tavily, bing
    engine: serper
    # 搜索API密钥 (选择一个配置)
    # Serper: https://serper.dev 免费额度 2500次/月
    # Tavily: https://tavily.com 免费额度 1000次/月
    # Bing: https://azure.microsoft.com/services/cognitive-services/bing-web-search-api/
    api-key: your_search_api_key
    # 为节约成本，只保留最相关的3条结果
    max-results: 3
  # 邮件发送配置 (SMTP)
  mail:
    smtp-host: smtp.163.com
    smtp-port: 465
    smtp-username: your_mail@example.com
    smtp-password: "your_smtp_password_or_app_password"
    smtp-ssl-enabled: true
    from-name: AI Agent
  # 日程管理配置
  schedule:
    # 是否启用日程功能
    enabled: true
    # 日程文件存储路径
    storage-path: ./data/schedules
    # 用户接收邮件地址（用于发送汇总和提醒）
    user-email: your_mail@example.com
    # 每日汇总发送时间 (cron表达式，默认每天20:00)
    daily-summary-cron: "0 0 20 * * ?"
    # 早上提醒时间 (cron表达式，默认每天08:00)
    morning-reminder-cron: "0 0 8 * * ?"
  # 文件上传配置
  file:
    upload-dir: ./data/documents
    allowed-types: txt,md,pdf,doc,docx
  autonomy:
    enabled: true
    workspace-root: .
    output-dir: ./generated/autonomy
    allow-backend-verify: true
    allow-frontend-verify: true
    allow-source-write: false
    allow-remote-update: false
    command-timeout-seconds: 180
  skills:
    config-path: skills.yaml
    auto-load: true
    findskills-enabled: false
    findskills-url: ""
    findskills-timeout-seconds: 10
  security:
    issuer: agent-demo
    jwt-secret: ${JWT_SECRET:replace_with_a_32_plus_byte_secret=}
    access-token-minutes: 120
    refresh-token-days: 7
    email-code-ttl-seconds: 600
    email-code-cooldown-seconds: 120
    github:
      enabled: true
      client-id: "your_github_client_id"
      client-secret: "your_github_client_secret"
      authorize-uri: https://github.com/login/oauth/authorize
      token-uri: https://github.com/login/oauth/access_token
      user-uri: https://api.github.com/user
      emails-uri: https://api.github.com/user/emails
      redirect-uri: http://localhost:3000/oauth/github/callback
      scope: "read:user user:email"
      state-ttl-seconds: 600
